<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NX Loading Screen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;900&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="slideshow" class="slideshow"></div>
    <div class="bg-overlay"></div>

    <div class="ui-wrapper">

        <!-- Header -->
        <header class="header">
            <div class="logo-area">
                <div class="server-logo">
                    <img src="images/logo.png" alt="Logo" class="logo-img"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                    <span class="logo-text" style="display:none">NVU</span>
                </div>
                <div class="server-info">
                    <h1 id="server-name" class="server-name">North Valley University</h1>
                    <p id="server-tagline" class="server-tagline">ประสบการณ์การเล่นที่ดีที่สุด</p>
                </div>
            </div>
            <div class="header-right">
                <div class="server-status">
                    <span class="status-dot"></span>
                    <span class="status-text">กำลังเชื่อมต่อ</span>
                </div>
                <div class="clock-box">
                    <span id="server-clock">--:--:--</span>
                </div>
            </div>
        </header>

        <!-- Content Pages -->
        <div class="content-area">

            <!-- Page: Home -->
            <section class="page active" id="page-home"></section>

            <!-- Page: Server Updates -->
            <section class="page" id="page-updates">
                <h2 class="page-title">SERVER POSTER</h2>
                <div class="updates-grid" id="updates-container"></div>
            </section>

            <!-- Page: Server Rules -->
            <section class="page" id="page-rules">
                <h2 class="page-title">SERVER RULES</h2>
                <div class="rules-list" id="rules-container"></div>
            </section>

            <!-- Page: Server Staff -->
            <section class="page" id="page-staff">
                <h2 class="page-title">SERVER STAFF</h2>
                <div class="staff-grid" id="staff-container"></div>
            </section>

            <!-- Page: Gallery -->
            <section class="page" id="page-gallery">
                <h2 class="page-title">GALLERY</h2>
                <div class="gallery-categories">
                    <button class="cat-btn active" data-category="all"         onclick="filterGallery('all')">ทั้งหมด</button>
                    <button class="cat-btn"         data-category="events"      onclick="filterGallery('events')">กิจกรรม</button>
                    <button class="cat-btn"         data-category="screenshots" onclick="filterGallery('screenshots')">ภาพหน้าจอ</button>
                    <button class="cat-btn"         data-category="showcase"    onclick="filterGallery('showcase')">ไฮไลต์</button>
                </div>
                <div id="gallery-container" class="gallery-grid"></div>
            </section>

        </div>

        <!-- Page Navigation Arrows -->
        <button class="page-nav page-nav-left" id="page-prev" onclick="changePage(-1)">«</button>
        <button class="page-nav page-nav-right" id="page-next" onclick="changePage(1)">»</button>

        <!-- Footer -->
        <footer class="footer">

            <!-- Music Player Pill -->
            <div class="music-area">
                <div class="music-player-pill glass-pill">
                    <div class="music-side-info music-side-left">
                        <span class="track-side-label" id="mp-label-left"></span>
                    </div>

                    <div class="music-center-block">
                        <button class="mp-ctrl" id="mp-prev" title="เพลงก่อนหน้า">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="11" height="11">
                                <polygon points="19,20 9,12 19,4"/><rect x="4" y="4" width="3" height="16" rx="1"/>
                            </svg>
                        </button>

                        <div class="album-art" id="album-art">
                            <svg class="album-art-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24">
                                <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
                            </svg>
                            <img id="album-art-img" src="" alt="" style="display:none">
                        </div>

                        <button class="mp-ctrl" id="mp-next" title="เพลงถัดไป">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="11" height="11">
                                <polygon points="5,4 15,12 5,20"/><rect x="17" y="4" width="3" height="16" rx="1"/>
                            </svg>
                        </button>
                    </div>

                    <div class="music-side-info music-side-right">
                        <span class="track-side-label" id="mp-label-right"></span>
                    </div>
                </div>
            </div>

            <!-- Progress Row -->
            <div class="music-progress-row">
                <button class="mp-play-btn" id="mp-toggle" title="เล่น/หยุด">
                    <svg id="mp-icon-play" viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><polygon points="5,3 19,12 5,21"/></svg>
                    <svg id="mp-icon-pause" viewBox="0 0 24 24" fill="currentColor" width="13" height="13" style="display:none"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                </button>
                <span class="mp-time" id="mp-time-cur">00:00</span>
                <div class="mp-bar-track" id="mp-bar-track">
                    <div class="mp-bar-fill" id="mp-bar-fill"></div>
                </div>
                <span class="mp-time" id="mp-time-total">00:00</span>
                <button class="mp-ctrl mp-mute-btn" id="mp-mute" title="ปิด/เปิดเสียง">
                    <svg id="mp-icon-vol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
                        <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor" stroke="none"/>
                        <path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/>
                    </svg>
                    <svg id="mp-icon-mute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13" style="display:none">
                        <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor" stroke="none"/>
                        <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
                    </svg>
                </button>
                <input type="range" class="mp-volume" id="mp-volume" min="0" max="100" value="50">
            </div>

            <!-- Bottom Row: Social + Loading -->
            <div class="footer-bottom-row">
                <div class="loading-info">
                    <span id="loading-status" class="loading-status">กำลังเตรียมระบบ...</span>
                    <span id="loading-percent" class="loading-percent">0%</span>
                </div>

                <div class="social-icons">
                    <!-- Discord -->
                    <button class="social-btn" title="Discord">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17">
                            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.003.024.017.044.035.062a19.87 19.87 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                        </svg>
                    </button>
                    <!-- X / Twitter -->
                    <button class="social-btn" title="X / Twitter">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17">
                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                        </svg>
                    </button>
                    <!-- Instagram -->
                    <button class="social-btn" title="Instagram">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                        </svg>
                    </button>
                    <!-- YouTube -->
                    <button class="social-btn" title="YouTube">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17">
                            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Loading Progress Bar -->
            <div class="progress-track">
                <div id="progress-bar" class="progress-bar">
                    <div class="progress-glow"></div>
                </div>
            </div>

        </footer>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <img id="lightbox-img" src="" alt="">
    </div>

    <!-- Custom Cursor -->
    <div id="cursor-dot"  class="cursor-dot"></div>
    <div id="cursor-ring" class="cursor-ring"></div>

    <script src="js/main.js"></script>
</body>
</html>
